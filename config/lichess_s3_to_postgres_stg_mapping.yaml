# Метаданные для идентификации файла и таблицы
source_pattern: "games_*.json"
target_table: "public.chess_games" # Замените на реальное имя вашей таблицы

mappings:
  # 1. Поле отсутствует в JSON, нужно сгенерировать (т.к. это PRIMARY KEY)
  - db_column: "game_id"
    json_key: "id"
    data_type: "varchar(100)"
    is_nullable: false

  # 2. Поле отсутствует в JSON, является константой
  - db_column: "source_platform"
    json_key: null
    transform: "constant"
    default_value: "CHESS_COM" # ЗАМЕНИТЕ на нужное значение (например, "LICHESS")
    data_type: "varchar(11)"
    is_nullable: false

  # 3. Поля, названия которых совпадают в JSON и БД
  - db_column: "rated"
    json_key: "rated"
    data_type: "boolean"
    is_nullable: true

  - db_column: "variant"
    json_key: "variant"
    data_type: "varchar(50)"
    is_nullable: true

  - db_column: "speed"
    json_key: "speed"
    data_type: "varchar(20)"
    is_nullable: true

  - db_column: "created_at"
    json_key: "created_at"
    data_type: "TIMESTAMP"
    is_nullable: true

  - db_column: "last_move_at"
    json_key: "last_move_at"
    data_type: "TIMESTAMP"
    is_nullable: true

  - db_column: "status"
    json_key: "status"
    data_type: "varchar(30)"
    is_nullable: true

  - db_column: "winner"
    json_key: "winner"
    data_type: "varchar(5)"
    is_nullable: true

  - db_column: "moves"
    json_key: "moves"
    data_type: "text"
    is_nullable: true

  - db_column: "eco_code"
    json_key: "eco_code"
    data_type: "varchar(3)"
    is_nullable: true

  - db_column: "white_player_id"
    json_key: "white_player_id"
    data_type: "integer"
    is_nullable: true

  - db_column: "black_player_id"
    json_key: "black_player_id"
    data_type: "integer"
    is_nullable: true

  - db_column: "white_rating"
    json_key: "white_rating"
    data_type: "smallint"
    is_nullable: true

  - db_column: "black_rating"
    json_key: "black_rating"
    data_type: "smallint"
    is_nullable: true

  - db_column: "time_initial"
    json_key: "time_initial"
    data_type: "integer"
    is_nullable: true

  - db_column: "time_increment"
    json_key: "time_increment"
    data_type: "integer"
    is_nullable: true

  - db_column: "username"
    json_key: "username"
    data_type: "varchar(50)"
    is_nullable: true

  - db_column: "platform_user_id"
    json_key: "platform_user_id"
    data_type: "varchar(100)"
    is_nullable: true